<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DDI Knowledge Base – Disability Driving Q&A</title>
  <meta name="description" content="Interactive Q&A for disabilitydrivinginstructors.com — answers about DVLA rules, vehicle adaptations, licences and tests." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] } } }
    };
  </script>
  <style>
    mark { background: #fde68a; color: #78350f; border-radius: 2px; padding: 0 2px; }
    .dark mark { background: #92400e; color: #fef3c7; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    .answer-text { line-height: 1.75; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

e"},{id:"tests",label:"Theory & Practical Tests",icon:"ClipboardCheck",description:"Test support and accommodations",color:"teal"},{id:"sen",label:"Special Educational Needs",icon:"BookOpen",description:"Autism, dyslexia, ADHD and more",color:"pink"},{id:"hearing",label:"Hearing Difficulties",icon:"Ear",description:"Deaf and hard of hearing",color:"indigo"},{id:"motability",label:"Motability & Funding",icon:"PoundSterling",description:"Schemes, grants and costs",color:"amber"},{id:"adis",label:"For ADIs",icon:"Users",description:"Advice for driving instructors",color:"red"}],kr=[{id:"ftd-1",question:"Can I learn to drive if I have a disability?",answer:"Yes \u2014 disability is no obstacle to driving. Many people with physical disabilities, special educational needs, and hearing difficulties can drive a standard car. With the right specialist instructor and suitable vehicle adaptations, driving is achievable for a wide range of conditions. The first step is to discuss learning to drive with your doctor, who can advise whether you meet the medical standards of fitness to drive.",category:"first-time",tags:["disability","learning to drive","getting started"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/"},{id:"ftd-2",question:"What is the minimum eyesight standard for driving?",answer:"You must be able to read a standard car number plate from a distance of 20 metres. If you have any doubts about your eyesight, book an optician's test and tell them you want to check the driving standard. Your ADI will also conduct a practical eyesight test (number plate reading at 20 metres) before your first driving lesson. If you cannot meet the legal eyesight requirement, you must not apply for a driving licence.",category:"first-time",tags:["eyesight","vision","number plate","standard"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/minimum-eyesight-standards-for-drivers/"},{id:"ftd-3",question:"How do I apply for my first provisional driving licence?",answer:"You can apply online at gov.uk or get a D1 application form from the Post Office. The cost is \xA334 online or \xA343 by post. You must complete the eyesight declaration (Section 3) and the health declaration (Section 4). If you have a notifiable medical condition, you can use Section 4 to notify DVLA \u2014 a separate notification is not normally necessary. If you have a condition not listed on the form that could affect fitness to drive, you must notify DVLA separately.",category:"first-time",tags:["provisional licence","D1 form","application","DVLA"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/1a-applying-for-your-first-provisional-driving-licence/"},{id:"ftd-4",question:"Can I drive at 16 if I have a disability?",answer:"Yes \u2014 some disabled people can drive from age 16 instead of 17. In England and Wales you need to be receiving the higher rate mobility component of DLA or the enhanced rate mobility component of PIP. In Scotland you need the higher rate mobility component of CDP or the enhanced rate of ADP. In Northern Ireland the rules are the same as England and Wales. You must tick the specific box on the D1 application form and provide evidence of your benefit entitlement. Apply at least 3 weeks before your 16th birthday.",category:"first-time",tags:["16","DLA","PIP","CDP","ADP","age","young driver"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/driving-at-16-with-high-rate-mobility-of-pip-dla/"},{id:"ftd-5",question:"What happens if I lose my qualifying benefit while driving at 16?",answer:"DVLA policy updated in September 2024 states that if your circumstances change while you are 16 and you lose your qualifying benefit (DLA/PIP/CDP/ADP) or it is re-assessed at a lower rate, your driving entitlement will be revoked and any theory or practical test pass will be void. This is confirmed in DVLA INS 57P (September 2024) and written confirmation from DVLA Policy (July 2025).",category:"first-time",tags:["16","benefit loss","revocation","DLA","PIP"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/what-are-the-rules-for-driving-at-16-england-wales/"},{id:"ftd-6",question:"What is a Driving Mobility Assessment and should I have one?",answer:"A Driving Mobility Assessment is conducted by an Occupational Therapist (OT) and an Approved Driving Instructor (ADI) at a Driving Mobility Assessment Centre. It is the best way to get impartial advice before starting lessons. The assessment can advise whether you can drive a standard car or need adaptations, and will produce a report with recommendations. Contact Driving Mobility on 0800 559 3636 or visit drivingmobility.org.uk.",category:"first-time",tags:["Driving Mobility","assessment","OT","adaptations","advice"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/assessment-and-advice-about-learning-to-drive/"},{id:"ftd-7",question:"Do specialist driving instructors have adapted tuition cars?",answer:"Yes \u2014 many specialist driving instructors have specially adapted tuition vehicles. The type of adaptations varies between instructors, so it's important to check that the instructor's car has the adaptations you need. When searching for an instructor on this website, you can filter by the type of adaptations available.",category:"first-time",tags:["adapted car","tuition car","adaptations","instructor"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/1b-do-driving-instructors-have-adapted-tuition-cars/"},{id:"ftd-8",question:"Is help available with funding driving lessons?",answer:"Yes \u2014 the Motability Foundation offers a Driving Lessons Grant for disabled learner drivers who are on the Motability Scheme. To qualify you must have a Motability Scheme vehicle (or one arriving within 4 months), hold a provisional licence, have passed your theory test, and receive a means-tested benefit. The standard Motability funded lesson rate is \xA345 per hour. Visit motabilityfoundation.org.uk for details.",category:"first-time",tags:["funding","lessons","Motability","grant","cost"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/help-with-funding-driving-lessons/"},{id:"rtd-1",question:"Can I return to driving after illness or a medical condition?",answer:"Many people return to driving after accident or illness without difficulty. The first step is always to discuss this with your doctor \u2014 they can confirm whether an immediate return is possible or whether you should stop driving for a period. If there are questions about your practical driving ability, you or your doctor can contact your local Driving Mobility Assessment Centre.",category:"returning",tags:["returning","illness","accident","doctor"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/returning-to-driving/"},{id:"rtd-2",question:"Do I need to notify DVLA if I develop a medical condition?",answer:"Yes \u2014 it is your legal responsibility to inform DVLA if you develop a notifiable medical condition that may affect your ability to drive. Failure to notify is a criminal offence that can result in a fine of up to \xA31,000, may lead to prosecution if involved in an accident, and could invalidate your insurance. Contact DVLA Medical Unit: phone 0300 790 6806, webchat at contact.dvla.gov.uk/drivers-medical, or post to DVLA, Drivers Medical Unit, Swansea, SA99 1TU.",category:"returning",tags:["DVLA","notification","notifiable","medical condition","legal"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/returning-to-driving/does-dvla-need-to-be-notified/"},{id:"rtd-3",question:"What is voluntary surrender of a driving licence?",answer:"Voluntary surrender means you choose to send your driving licence back to DVLA for safe keeping. This may be advised if your GP tells you to stop driving for 3 months or more, your medical condition affects safe driving for 3 months or more, or you no longer meet the medical standards. Voluntary surrender is much easier to reverse than having your licence revoked by DVLA. Send your licence with a completed declaration form to DVLA \u2014 see gov.uk/government/publications/declaration-of-voluntary-surrender.",category:"returning",tags:["voluntary surrender","licence","DVLA","stop driving"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/voluntary-surrender-of-your-driving-licence-or-dvla-revoking-it/"},{id:"rtd-4",question:"What is Section 88 of the Road Traffic Act?",answer:"Section 88 of the Road Traffic Act 1988 allows you to continue driving while your application is being processed by DVLA. To qualify: you must meet the medical standards of fitness to drive; you must have held a valid licence; DVLA must have received your correct and complete application within the last 12 months; and your last licence must not have been revoked or refused for medical reasons. Note \u2014 Section 88 does NOT apply if your licence was previously revoked.",category:"returning",tags:["Section 88","Road Traffic Act","continue driving","application"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/voluntary-surrender-of-your-driving-licence-or-dvla-revoking-it/"},{id:"rtd-5",question:"What is a PDAL (Provisional Disability Assessment Licence)?",answer:"A PDAL is issued by DVLA when your driving licence has been revoked or suspended and DVLA wants you to have a practical driving assessment. The PDAL looks identical to a standard provisional licence but has restriction code 121 applied. The practical drive is normally conducted at a Driving Mobility Assessment Centre in a centre vehicle. Once the assessment is complete the PDAL expires and you can no longer drive until DVLA issues a full licence.",category:"returning",tags:["PDAL","provisional disability","assessment","revocation","code 121"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/voluntary-surrender-of-your-driving-licence-or-dvla-revoking-it/"},{id:"rtd-6",question:"What is the difference between a Driving Mobility Assessment and a DVLA Medical Appraisal?",answer:"A Driving Mobility Assessment is conducted by an OT and ADI at a Driving Mobility Assessment Centre \u2014 it includes both a clinical assessment and a practical drive, and can result from GP referral, Motability referral, or self-referral. A DVLA Medical Appraisal is conducted by a DVSA Local Driving Test Manager (LDTM) at a local driving test centre \u2014 it is only an in-car practical assessment (no clinical component) and only happens following a DVLA referral. Both assess fitness to drive.",category:"returning",tags:["Driving Mobility","DVLA appraisal","assessment","LDTM","OT"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-mobility-assessment-or-dvla-medical-appraisal/"},{id:"rtd-7",question:"Can I return to driving after a stroke or TIA?",answer:"It may be possible to return to driving after a stroke or TIA, but you must notify DVLA and discuss with your doctor first. DVLA will assess your medical fitness to drive and may require a practical driving assessment. The waiting period before returning to driving depends on the severity of the stroke and DVLA's medical guidance. Contact the DVLA Medical Unit on 0300 790 6806 for specific guidance.",category:"returning",tags:["stroke","TIA","transient ischaemic attack","returning"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/returning-to-driving/returning-to-driving-following-a-stroke-or-tia/"},{id:"rtd-8",question:"Can I return to driving after a brain injury?",answer:"Returning to driving after brain injury is possible for some people but requires careful medical assessment. You must notify DVLA of any relevant medical condition, discuss with your doctor, and may need a Driving Mobility Assessment to evaluate your practical driving ability. A specialist driving instructor with experience of brain injury rehabilitation may be needed for any retraining required.",category:"returning",tags:["brain injury","returning","assessment","DVLA"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/returning-to-driving/returning-to-driving-after-brain-injury/"},{id:"dvla-1",question:"What conditions must be notified to DVLA?",answer:"You must notify DVLA about any medical condition listed in the health declaration on the D1 licence application form, and any other condition not listed that could affect your fitness to drive. The full A-Z list is at gov.uk/health-conditions-and-driving. Conditions that do NOT need to be declared include: learning difficulties (dyslexia, dyspraxia, dyscalculia), developmental disorders (autism, ADHD, Asperger's) unless they significantly affect driving ability, and deafness or hearing difficulties for car drivers.",category:"dvla",tags:["DVLA","notifiable","medical conditions","D1","declaration"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/dvla-notification-requirements/"},{id:"dvla-2",question:"What are the consequences of not telling DVLA about a medical condition?",answer:"The consequences are serious: (1) DVLA states you can be fined up to \xA31,000; (2) your tuition car insurance may be invalidated; (3) if it becomes apparent during a driving test that a condition is more serious than DVLA has been told about, the examiner will stop the test and notify DVLA; (4) in a worst case scenario DVLA may revoke the driving licence.",category:"dvla",tags:["DVLA","fine","insurance","consequences","notification"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/dvla-notification-requirements/"},{id:"dvla-3",question:"What is driving licence restriction code 78?",answer:"Code 78 is an administrative code applied when you pass your test in a vehicle with automatic transmission. It restricts you to only driving vehicles with automatic transmission. If you later need to drive a manual, you must pass a new DVSA test in a manual car to have the code removed. Code 78 is different from Code 10, which is applied for medical reasons.",category:"dvla",tags:["code 78","automatic","transmission","restriction code"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"dvla-4",question:"What is driving licence restriction code 10?",answer:"Code 10 (modified transmission) is applied for medical reasons when a driver needs automatic selection of gear ratio because of a medical condition. Reasons include: loss of function in the left leg preventing clutch use, loss of function in the right leg requiring left foot accelerator, loss of arm function preventing gear change, needing to use hand controls with one hand, or needing automatic because manual gear operation causes cognitive overload.",category:"dvla",tags:["code 10","transmission","automatic","medical","restriction code"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"dvla-5",question:"What are driving licence restriction codes 20 and 25?",answer:"Code 20 relates to modified braking systems (e.g. hand controls for braking). Code 25 relates to modified accelerator systems (e.g. hand controls for acceleration, or a left foot accelerator). Both codes are applied when you use hand controls that operate both the accelerator and brake. If you use a left foot accelerator with the standard brake pedal, only Code 25 is needed.",category:"dvla",tags:["code 20","code 25","hand controls","accelerator","braking"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"dvla-6",question:"What is driving licence restriction code 40?",answer:"Code 40 is applied when you need steering adaptations due to upper limb disability. This includes steering balls, straight pegs, peg and glove, tri-pod quad grip, or electric mini wheel steering. The code reflects that standard two-hand steering is not possible.",category:"dvla",tags:["code 40","steering","upper limb","steering ball","restriction code"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"dvla-7",question:"What is driving licence restriction code 35?",answer:"Code 35 is applied when secondary controls (indicators, lights, windscreen wipers, horn etc.) have been modified so they can be operated without releasing the steering device. This may be as simple as an indicator extension, or as complex as a remote secondary control system such as Bever SmartSteer, Lodgesons R200, or Veigel MyCommand.",category:"dvla",tags:["code 35","secondary controls","indicator","remote","restriction code"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"dvla-8",question:"What is driving licence restriction code 42?",answer:"Code 42 covers modified rear-view mirrors or devices needed when a driver cannot safely turn to check blind spots. This includes panoramic interior mirrors, interior and exterior blind spot mirrors, junction view mirrors, and junction view camera systems. Legislation changes permitting junction view cameras were confirmed by DVLA and DfT in August 2017.",category:"dvla",tags:["code 42","mirrors","blind spot","rear view","cameras"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"dvla-9",question:"What is driving licence restriction code 43?",answer:"Code 43 is applied when the driver's seat has been modified \u2014 for example a booster seat for drivers of short stature, added lateral support, or armrests. It also covers seat belt adaptations for improved sitting stability.",category:"dvla",tags:["code 43","seat","driver seat","booster","restriction code"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"dvla-10",question:"What is driving licence restriction code 114?",answer:"Code 114 ('with any special controls required for safe driving') is a temporary code applied by DVLA to a first provisional licence when the applicant has indicated on the D1 form that they need special controls. It is replaced by the specific restriction codes when a full licence is issued after passing the practical test.",category:"dvla",tags:["code 114","provisional","temporary","special controls"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"dvla-11",question:"What is driving licence restriction code 121?",answer:"Code 121 indicates that a Provisional Disability Assessment Licence (PDAL) has been issued. A PDAL looks identical to a standard provisional licence apart from this code. It is issued when a driving licence has been revoked and DVLA requires a practical driving assessment before deciding whether to re-issue a full licence.",category:"dvla",tags:["code 121","PDAL","provisional disability","restriction code"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"dvla-12",question:"Where do I find restriction codes on my driving licence?",answer:"Restriction codes can be found on the rear of the plastic licence card in column 12, or on an online licence check at gov.uk/view-driving-licence under the title 'Restrictions'. The full list of UK driving licence restriction codes is available at gov.uk/driving-licence-codes.",category:"dvla",tags:["restriction codes","licence card","column 12","online check"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"dvla-13",question:"How do I remove or change restriction codes on my licence?",answer:"If restriction codes were applied after passing a driving test using adaptations, a new DVSA test in a standard vehicle is normally required to remove them. If Code 78 (automatic) was applied, a new DVSA test in a manual car is needed to remove it. To book an upgrade test to remove codes, ring the DVSA booking centre \u2014 you cannot book this test online. There is no need to take another theory test.",category:"dvla",tags:["remove codes","upgrade test","restriction codes","DVSA"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"adapt-1",question:"What is a push/pull hand control?",answer:"The push/pull lever is the most common form of hand control, normally operated by the right hand. You push to brake and pull to accelerate \u2014 this operates the foot pedals mechanically. It usually has an integral indicator switch on the handle and is used with a left hand operated steering ball. Mechanical push/pull hand controls are available from several UK manufacturers. An electronic version is also available where the accelerator operates electronically rather than mechanically.",category:"adaptations",tags:["hand controls","push/pull","accelerator","brake","adaptation"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/physical-dsability/hand-controls/"},{id:"adapt-2",question:"What are ring accelerators?",answer:"Ring accelerators allow you to steer conventionally with both hands on the wheel while operating the accelerator ring with your thumb and fingers. The brake lever is pushed forward to brake. Types include: over-ring accelerator, under-ring accelerator (K5 Gas Ring), and the Ghost Ring, which attaches to the underside of the steering wheel rim.",category:"adaptations",tags:["ring accelerator","Ghost Ring","hand controls","steering"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/physical-dsability/hand-controls/"},{id:"adapt-3",question:"What is a radial accelerator?",answer:"The radial accelerator / push brake hand control is designed for people with poor finger grip. You push down towards the floor to accelerate and push forward to brake. It is an alternative to the traditional push/pull lever for those who find the grip action difficult.",category:"adaptations",tags:["radial accelerator","poor grip","hand controls"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/physical-dsability/hand-controls/"},{id:"adapt-4",question:"What is a left foot accelerator?",answer:"A left foot accelerator (also called a 'twin flip') allows someone who has lost use of their right leg to use their left foot for acceleration while using the standard brake pedal. Restriction code 25 is applied to the licence. The standard right-side accelerator pedal is usually hidden or made inoperable to avoid accidental use.",category:"adaptations",tags:["left foot accelerator","twin flip","code 25","right leg"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/physical-dsability/left-foot-accelerator/"},{id:"adapt-5",question:"What steering modifications are available?",answer:"For upper limb disability, various steering aids are available: standard steering ball, straight peg, peg and glove, tri-pod quad grip, and electric mini wheel steering. For very severe upper limb disability, left foot steering (with right foot for gas and brake) is possible. All steering adaptations require restriction code 40 to be applied to the licence.",category:"adaptations",tags:["steering","steering ball","peg","electric mini wheel","code 40","upper limb"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/physical-dsability/steering-modifications/"},{id:"adapt-6",question:"What remote secondary control systems are available?",answer:"Remote secondary control systems allow indicators, horn, wash/wipe and other functions to be operated without releasing the steering. Systems available include: Bever SmartSteer, Lodgesons R200, Veigel MyCommand, Guidosimplex 1096, and Lodgesons R100. A simple indicator extension may be sufficient for less severe upper limb problems. Restriction code 35 is applied.",category:"adaptations",tags:["secondary controls","indicators","remote","Bever SmartSteer","code 35"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/physical-dsability/remote-secondary-controls/"},{id:"adapt-7",question:"Can someone with an upper limb absence drive?",answer:"Yes \u2014 it is perfectly possible and totally legal for someone with an upper limb absence to drive. Depending on the degree of absence, they may be able to use standard controls, or may need adaptations. With a partial absence they may develop the 'palm and slide' technique for steering. Possible adaptations include: automatic gearbox (codes 78/10), steering ball (code 40), indicator crossover extension (code 35), or remote secondary control systems (code 35). REACH (reach.org.uk) supports children and young people with upper limb differences.",category:"adaptations",tags:["upper limb","absence","amputation","REACH","adaptations"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-with-an-upper-limb-absence-advice-for-adis/"},{id:"adapt-8",question:"What is a combined service brake and accelerator system (code 32)?",answer:"Code 32 covers combined accelerator and service brake systems operated by one hand (such as a push/pull hand control where the driver cannot move their hand between separate accelerator and brake controls). The Electric Gas & Brake (EGB) control is another type. Code 32 should only be applied when the combined system is needed because the driver cannot use separate accelerator and brake controls.",category:"adaptations",tags:["code 32","combined brake","accelerator","EGB","one hand"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"test-1",question:"What theory test support is available for people with special needs?",answer:"Available support includes (no proof required, must be requested when booking): computer voiceover, coloured overlay clings (for reading problems, autism, ADHD, dyslexia). With proof of special needs: extra time (up to double), face-to-face reader/recorder, private room/separate environment. Additional support requiring extra evidence: oral language modification (rephrasing questions). Support for physical difficulties: wheelchair access, height-adjustable desks, bespoke computer equipment. Book at gov.uk/book-theory-test.",category:"tests",tags:["theory test","special needs","extra time","support","voiceover","reader"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/booking-and-taking-the-theory-test-if-additional-support-is-required/"},{id:"test-2",question:"What study aids are available for the theory test if I have special needs?",answer:"Study aids include: books with illustrations designed to aid understanding and memory, audio books (listen instead of read), flash cards as memory aids, 'Theory Test Explained' and video training courses. Driving Mobility also provides one-to-one classroom coaching at various venues through their Theory Test Support project.",category:"tests",tags:["theory test","study aids","audio books","special needs","dyslexia"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/studying-for-the-theory-test-if-you-have-special-needs-what-study-aids-are-available-to-help-you/"},{id:"test-3",question:"What special provisions are available for the practical driving test?",answer:"You must notify DVSA when booking if you: have a physical disability needing an adapted car; are deaf or have severe hearing difficulties; have missing limbs (even without adaptations); have learning difficulties or SEN; or have restricted movement. No matter how serious your disability, you take the same driving test as everyone else. Reasonable adjustments can be made for: the eyesight test (remain in car), the 'tell me' question (alternative question if unable to do activity), examiner communication, independent driving exercise, and 'show me' questions.",category:"tests",tags:["practical test","special needs","DVSA","accommodations","adjustments"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/booking-and-taking-the-practical-test-if-additional-support-is-required/"},{id:"test-4",question:"What support is available for deaf candidates taking the theory test?",answer:"When booking the theory test, no proof of deafness is required but support must be requested. An on-screen BSL interpreter is available (though problems have been reported with this system). A face-to-face BSL interpreter provided by DVSA is recommended as the best option. A personal assistant or driving instructor may accompany the deaf candidate into the test centre and sit next to them during the test.",category:"tests",tags:["theory test","deaf","BSL","interpreter","hearing"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/booking-and-taking-the-theory-test-if-additional-support-is-required/"},{id:"test-5",question:"Can the ADI act as interpreter for a deaf candidate's practical test?",answer:"Yes \u2014 DVSA has agreed that the ADI can act as an interpreter for the initial discussion between the examiner and the deaf candidate (the 'tell me' question section). The ADI should notify DVSA of this need when booking the test.",category:"tests",tags:["practical test","deaf","ADI","interpreter","tell me"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/booking-and-taking-the-practical-test-if-additional-support-is-required/"},{id:"test-6",question:"What is the DVSA booking centre number for practical tests?",answer:"The DVSA Driving Test Booking Centre number is 0300 200 1122. You must call this number (not book online) if you need: special needs accommodations, an upgrade test to remove restriction codes, or any non-standard practical test arrangement.",category:"tests",tags:["DVSA","booking","phone","practical test","special needs"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/booking-and-taking-the-practical-test-if-additional-support-is-required/"},{id:"sen-1",question:"Do I need to declare dyslexia, dyspraxia or dyscalculia to DVLA?",answer:"No \u2014 learning difficulties such as dyslexia, dyspraxia, and dyscalculia do NOT need to be declared when applying for a provisional licence. DVLA does not need to be informed of a learning difficulty. Be careful not to confuse 'learning difficulty' with 'severe learning disability' \u2014 severe learning disability is a notifiable condition but learning difficulties are not.",category:"sen",tags:["dyslexia","dyspraxia","dyscalculia","learning difficulty","DVLA","declare"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/do-you-need-to-declare-learning-difficulties-e-g-dyslexia-or-developmental-disorders-e-g-autism-when-applying-for-your-first-provisional-driving-licence/"},{id:"sen-2",question:"Do I need to declare autism or ADHD to DVLA?",answer:"Generally no \u2014 developmental disorders such as autism, ADHD, and Asperger's syndrome do not need to be declared when making a licence application, as they don't match any listed health conditions on the D1 form. However, you should discuss driving with your GP who will advise if notification to DVLA is required if there are any significant issues to a degree that would raise concerns about fitness to drive.",category:"sen",tags:["autism","ADHD","Asperger's","developmental disorder","DVLA","declare"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/do-you-need-to-declare-learning-difficulties-e-g-dyslexia-or-developmental-disorders-e-g-autism-when-applying-for-your-first-provisional-driving-licence/"},{id:"sen-3",question:"What is the difference between a learning difficulty and a learning disability?",answer:"A learning difficulty (e.g. dyslexia, dyscalculia, dyspraxia) does not affect general intellect \u2014 it is not notifiable to DVLA. A learning disability is a reduced intellectual ability affecting everyday activities for life. Mild learning disability: DVLA must be notified, but driving may be permitted. Severe learning disability: DVLA must be notified and licensing is likely to be refused.",category:"sen",tags:["learning difficulty","learning disability","dyslexia","DVLA","difference"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/do-you-need-to-declare-learning-difficulties-e-g-dyslexia-or-developmental-disorders-e-g-autism-when-applying-for-your-first-provisional-driving-licence/"},{id:"sen-4",question:"What should a specialist instructor do differently for pupils with SEN?",answer:"A good specialist instructor will understand that every person is an individual and will tailor tuition to individual needs. For pupils with autism, dyslexia, ADHD, dyspraxia etc.: standard teaching techniques often don't work; the instructor needs to be creative and find alternative coaching methods; an automatic car may be more suitable if a manual causes cognitive overload; extra patience and perseverance are vital; and special needs provision should be requested for the practical test.",category:"sen",tags:["SEN","instructor","autism","dyslexia","ADHD","teaching methods"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/special-educational-needs/2-driving-tuition-for-people-with-special-and-specific-needs/"},{id:"hear-1",question:"Do I need to tell DVLA I am deaf?",answer:"No \u2014 deafness and hearing difficulties do NOT need to be notified to DVLA for car drivers (until renewal at age 70). There is no requirement to declare this on a D1 licence application form. However, you DO need to notify DVSA when booking your practical driving test.",category:"hearing",tags:["deaf","hearing","DVLA","notification","deafness"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/hearing-difficulties/getting-started/"},{id:"hear-2",question:"Can a deaf person learn to drive?",answer:"Absolutely yes \u2014 there is no reason why a deaf person cannot learn to drive in either a manual or automatic car. An automatic may be easier as there is no need to listen to the engine to change gear at the right time. Being deaf is not a disability \u2014 it is a communication barrier. Finding a specialist 'Deaf Aware' driving instructor (some are fluent in BSL) will make communication much easier.",category:"hearing",tags:["deaf","learning to drive","automatic","BSL","deaf aware"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/hearing-difficulties/"},{id:"hear-3",question:"What BSL support is available for the theory test for deaf candidates?",answer:"You can translate the theory test booking page into BSL using an online interpreter at book-theory-test.service.gov.uk. No proof of deafness is required. During the test: on-screen BSL is available (problems have been reported with this system), or a face-to-face BSL interpreter can be provided by DVSA (recommended as the best option). A personal assistant or driving instructor may accompany the deaf candidate into the test centre.",category:"hearing",tags:["BSL","theory test","deaf","interpreter","sign language"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/hearing-difficulties/the-theory-test-and-the-practical-driving-test/"},{id:"hear-4",question:"What support is available for the practical driving test for deaf candidates?",answer:"DVSA must be notified when booking if you are deaf or have severe hearing difficulties. The ADI can act as an interpreter for the initial discussion (tell me question) between examiner and candidate. If the candidate uses BSL, a BSL interpreter can be present. The examiner should also be aware that the candidate cannot hear and communicate accordingly. For the independent driving exercise, if the candidate cannot read road signs in English, the examiner can use BSL to communicate directions.",category:"hearing",tags:["practical test","deaf","BSL","interpreter","DVSA"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/booking-and-taking-the-practical-test-if-additional-support-is-required/"},{id:"motab-1",question:"What is the Motability Scheme?",answer:"The Motability Scheme allows disabled people to lease a car using their mobility allowance (DLA/PIP/CDP/ADP higher rate mobility component). The lease is normally for 3 years and includes insurance, breakdown assistance, servicing and maintenance. Adaptations can be included, though there may be a customer contribution. It is leased rather than owned \u2014 if you buy privately you eventually own the car outright.",category:"motability",tags:["Motability","scheme","lease","DLA","PIP","insurance"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/gettingandadaptingyournewcar/themotabilityscheme/"},{id:"motab-2",question:"Who can apply for the Motability Driving Lessons Grant?",answer:"The Driving Lessons Grant is for disabled people who are on the Motability Scheme AND meet additional criteria: (a) have a Motability Scheme vehicle or one arriving in the next 4 months; (b) hold a provisional UK driving licence; (c) have passed the theory test; (d) receive a means-tested benefit. The standard funded lesson rate is \xA345 per hour.",category:"motability",tags:["Motability","Driving Lessons Grant","funded lessons","eligibility"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/motability-funded-tuition-for-novice-learners-and-familiarisation-lessons-for-full-licence-holders/"},{id:"motab-3",question:"Can Motability fund familiarisation lessons for existing licence holders?",answer:"Yes \u2014 full licence holders who become disabled and need to train to use new driving adaptations may be able to get funded familiarisation lessons. There are two routes: (1) Motability Managed Adaptation Programme (MMAP) \u2014 Motability Operations subsidises basic adaptations and should also fund familiarisation training; (2) Motability Foundation grant \u2014 for complex/expensive adaptations, if the grant is agreed, training can also be funded.",category:"motability",tags:["familiarisation","full licence","adaptations","MMAP","Motability Foundation"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/motability-funded-tuition-for-novice-learners-and-familiarisation-lessons-for-full-licence-holders/"},{id:"motab-4",question:"Can I get VAT relief when buying a car as a disabled person?",answer:"Disabled people may be eligible for VAT relief on vehicle purchase and Road Tax exemption or reduction. Full details are available on the 'Road Tax exemption/reduction and VAT relief on vehicle purchase' page of the website. Check gov.uk for current eligibility criteria and how to claim.",category:"motability",tags:["VAT relief","road tax","exemption","disability","purchase"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/gettingandadaptingyournewcar/road-tax-exemption-reduction-and-vat-relief-on-vehicle-purchase/"},{id:"motab-5",question:"How do I add an ADI to a Motability insurance policy for tuition?",answer:"If tuition needs to take place in the client's Motability vehicle, the ADI must be added to the Motability insurance policy. The ADI needs to contact Motability Insurance directly to be added to the policy before any lessons can be conducted in the Motability car.",category:"motability",tags:["Motability","insurance","tuition car","ADI","policy"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/motability-funded-tuition-for-novice-learners-and-familiarisation-lessons-for-full-licence-holders/"},{id:"adi-1",question:"How should I verify a pupil has correctly notified DVLA?",answer:"There is normally nothing on the licence card or online licence check confirming notification. If notification has been made there should be correspondence from DVLA confirming receipt. ADIs are advised to use a signed 'Health Declaration' based on Section 4 of the D1 form \u2014 the pupil signs to declare that DVLA has been notified or that notification is not required. Keep a copy on file as evidence that all reasonable steps have been taken. A PDF template is available on the website.",category:"adis",tags:["DVLA notification","ADI","health declaration","verify","pupil"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/dvla-notification-requirements/"},{id:"adi-2",question:"What checks should I make before teaching a 16-year-old pupil?",answer:"Before starting lessons with a 16-year-old: (1) Complete an online licence check at gov.uk/view-driving-licence to confirm cat B entitlement is shown and check the 'from date' (should be their 16th birthday); (2) Carry out the check 24 hours before the first lesson; (3) Check your tuition car insurance covers 16-year-old drivers; (4) Ensure the D1 form was completed correctly with the box 'to drive a car at 16 because I am getting DLA/PIP' ticked.",category:"adis",tags:["16","ADI","licence check","cat B","insurance","DLA","PIP"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/what-are-the-rules-for-driving-at-16-england-wales/"},{id:"adi-3",question:"How do I register as an instructor on the DDI website?",answer:"Contact John Rogers at john@disabilitydrivinginstructors.com or call 01773 852198. A basic 'line entry' is free for the first 3 months, then \xA320 per year. An enhanced entry with more detail is available for a further \xA320 per year. To register, provide: contact details, bank details (for enhanced), driving licence, ADI certificate, insurance certificate, and DBS certificate. To be added as a Motability outsourced instructor, contact AA/Motability at Motability@theaa.com or 0330 053 0001.",category:"adis",tags:["ADI","register","membership","join","DDI website"],source:"https://www.disabilitydrivinginstructors.com/join-us/"},{id:"adi-4",question:"What are the principle rules for applying restriction codes?",answer:"The key principle is: restriction codes should be based on the needs of the client (what standard vehicle controls cannot be operated due to their disability) \u2014 NOT on what adaptations they have or are perceived to need. As John Rogers (DDI Chief Executive) states: 'Think that the restriction code should reflect the standard vehicle control that cannot be operated due to the client's disability.' Unnecessary or incorrect codes can cause significant problems for drivers.",category:"adis",tags:["restriction codes","principle","ADI","applying codes","guidelines"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/driving-licence-restriction-codes/"},{id:"adi-5",question:"What ADI training courses does DDI offer in 2026?",answer:"In 2026, DDI offers: (1) Deaf Awareness & Sign Language Course \u2014 started June 2026, 9 online modules at \xA340 each (\xA3360 total). Modules cover deaf awareness, BSL introduction, teaching deaf pupils, sentence structures, basic words, calendar words, car control, first lesson, and test manoeuvres. Presented by Costa Christou and Mike Gambin. (2) Disabilities & Medical Conditions Course \u2014 starting 2nd September 2026. Presenters include John Rogers, Lee Pollard, Gary Gough-Pugh BSc, and Tracey Field (anxiety modules).",category:"adis",tags:["ADI training","2026","Deaf Awareness","BSL","course","CPD"],source:"https://www.disabilitydrivinginstructors.com/about/adi-training-programme/"},{id:"adi-6",question:"What do I advise a pupil who has not made the required DVLA notification?",answer:"Advise the pupil that they must notify DVLA before driving. Advise them not to return their driving licence if the form asks for it \u2014 instead write on the form that the provisional licence is being retained to allow for driving under Section 88 cover. Once DVLA has been notified, and if the eligibility criteria are met, the pupil is permitted to continue driving under Section 88 of the Road Traffic Act 1988.",category:"adis",tags:["DVLA notification","Section 88","ADI advice","pupil","licence"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/information-for-adis/dvla-notification-requirements/"},{id:"gen-1",question:"How do I find a disability driving instructor near me?",answer:"Use the 'Find an Instructor' search on disabilitydrivinginstructors.com. You can search by full postcode and set a radius (e.g. within 5 miles). You can also refine the search by your specific requirements such as manual/automatic, type of adaptation needed, or Deaf Aware instructors. The instructors listed are all self-employed ADIs \u2014 the website does not employ them directly.",category:"first-time",tags:["find instructor","search","postcode","local","disability ADI"],source:"https://www.disabilitydrivinginstructors.com/find-an-instructor/"},{id:"gen-2",question:"What is Disability Driving Instructors (DDI)?",answer:"Disability Driving Instructors is an independent not-for-profit Community Interest Company (CIC) set up in partnership with Driving Mobility. It aims to: provide a one-stop shop of impartial advice for disabled people wanting to learn to drive or return to driving; maintain an accessible national register of specialist driving instructors; facilitate ADI training and CPD; and develop an accreditation scheme for specialist driving instructors. Contact: 0844 800 7355 / admin@disabilitydrivinginstructors.com.",category:"first-time",tags:["DDI","about","CIC","Driving Mobility","organisation"],source:"https://www.disabilitydrivinginstructors.com/about/"},{id:"gen-3",question:"What is Driving Mobility and how can they help?",answer:"Driving Mobility is a national network of driving assessment centres working with DVLA to assess disabled drivers. They can conduct pre-licence assessments, advise on adaptations, and provide practical driving assessments. They also run a Theory Test Support project with one-to-one coaching. Contact: 0800 559 3636 (free) / drivingmobility.org.uk.",category:"first-time",tags:["Driving Mobility","assessment","advice","DVLA","network"],source:"https://www.disabilitydrivinginstructors.com/driving-advice/first-time-drivers/assessment-and-advice-about-learning-to-drive/"}],lf=["ftd-1","ftd-4","dvla-1","sen-1","rtd-4","adapt-1","hear-1","motab-1"];var h=Je(Pr(),1),vu={Grid:Pe,Car:Ea,RotateCcw:vr,FileText:gr,Settings:Ir,ClipboardCheck:mr,BookOpen:cr,Ear:hr,PoundSterling:xr,Users:wr},Lt={blue:{bg:"bg-blue-50 dark:bg-blue-900/30",text:"text-blue-700 dark:text-blue-300",border:"border-blue-200 dark:border-blue-700",badge:"bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300"},green:{bg:"bg-green-50 dark:bg-green-900/30",text:"text-green-700 dark:text-green-300",border:"border-green-200 dark:border-green-700",badge:"bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300"},purple:{bg:"bg-purple-50 dark:bg-purple-900/30",text:"text-purple-700 dark:text-purple-300",border:"border-purple-200 dark:border-purple-700",badge:"bg-purple-100 text-purple-700 dark:bg-purple-900/50 dark:text-purple-300"},orange:{bg:"bg-orange-50 dark:bg-orange-900/30",text:"text-orange-700 dark:text-orange-300",border:"border-orange-200 dark:border-orange-700",
